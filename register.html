<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <title>Sportclub</title> 
    <link rel="icon" type="image/png" href="Imagenes/sports.png">
    <link rel="stylesheet" href="CSS/styles.css">
</head>    
<body>    
    <main class="caja-registro"> 
        <div class="logo-container">
            <img src="Imagenes/logo_empresa_letra_v1.png" alt="Logo sportclub" class="Logosportclub">
        </div>
        <h1>Registro</h1> 
        <form action="/submit" method="post"> 
            <label for="Nombre">Nombre:</label> 
            <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre">
            <label for="Edad">Edad:</label>
            <input type="number" id="edad" name="edad" placeholder="Ingrese su edad">
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="correo" placeholder="Ingrese su correo electrónico">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="contrasena" placeholder="Ingrese su contraseña"> 
             <label for="sports">Deporte de interés:</label>
             <select id="sports" name="deporte">
            <option>Seleccione un deporte...</option>
            <option value="Futbol">Futbol</option>
            <option value="Basket">Basketball</option>
            <option value="Tennis">Tenis</option>
            <option value="Natacion">Natacion</option>
</select>
  </select>
            <input type="submit" value="Registrarse"> 
            <div class="enlaces-ayuda">
    <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
</div>
        </form>
